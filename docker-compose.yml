name: carbontrack

services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-carbontrack}-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-carbontrack_db}
      MYSQL_USER: ${DB_USER:-carbontrack_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-carbontrack_pwd}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-carbontrack_root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - carbontrack_mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - carbontrack_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-carbontrack}-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      DB_NAME: ${DB_NAME:-carbontrack_db}
      DB_USER: ${DB_USER:-carbontrack_user}
      DB_PASSWORD: ${DB_PASSWORD:-carbontrack_pwd}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      TYPEORM_SYNC: ${TYPEORM_SYNC:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-19411}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - carbontrack_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-carbontrack}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-18411}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - carbontrack_net

networks:
  carbontrack_net:
    name: ${COMPOSE_PROJECT_NAME:-carbontrack}-net

volumes:
  carbontrack_mysql_data:
    name: ${COMPOSE_PROJECT_NAME:-carbontrack}-mysql-data

